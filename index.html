<script>
// ==================== CRYPTO HELPERS ====================
async function hashPassword(password, salt) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password + salt);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}
function generateSalt() {
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
}
function generateToken(length = 32) {
  const arr = new Uint8Array(length);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ==================== AUTH KEYS ====================
const AUTH_KEYS = {
  USERS: 'edel_users',
  SITES: 'edel_sites',
  SESSION: 'edel_session',
  INVITES: 'edel_invites',
};

function getAuthUsers() { try { return JSON.parse(localStorage.getItem(AUTH_KEYS.USERS) || '[]'); } catch { return []; } }
function saveAuthUsers(u) { localStorage.setItem(AUTH_KEYS.USERS, JSON.stringify(u)); }
function getAuthSites() { try { return JSON.parse(localStorage.getItem(AUTH_KEYS.SITES) || '[]'); } catch { return []; } }
function saveAuthSites(s) { localStorage.setItem(AUTH_KEYS.SITES, JSON.stringify(s)); }
function getAuthInvites() { try { return JSON.parse(localStorage.getItem(AUTH_KEYS.INVITES) || '[]'); } catch { return []; } }
function saveAuthInvites(i) { localStorage.setItem(AUTH_KEYS.INVITES, JSON.stringify(i)); }

function getSession() {
  try {
    const s = JSON.parse(localStorage.getItem(AUTH_KEYS.SESSION) || 'null');
    if (!s) return null;
    if (new Date(s.expiresAt) < new Date()) { localStorage.removeItem(AUTH_KEYS.SESSION); return null; }
    return s;
  } catch { return null; }
}
function saveSession(user, siteId) {
  const session = {
    userId: user.id,
    token: generateToken(),
    siteId: siteId,
    role: user.role,
    firstName: user.firstName,
    lastName: user.lastName,
    email: user.email,
    expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(),
  };
  localStorage.setItem(AUTH_KEYS.SESSION, JSON.stringify(session));
  return session;
}
function clearSession() { localStorage.removeItem(AUTH_KEYS.SESSION); }

// ==================== STATE & DATA ====================
const LS_KEY = 'edelegate_state';
const TASK_LIST = ['Informed Consent Process','Physical Examination','Assessment of Adverse Events','Protocol Deviations','IP Dispensing & Accountability','Data Entry & Query Resolution','Patient Scheduling & Coordination','Regulatory & IRB Submissions','Lab Sample Processing','Source Document Review','Safety Reporting','Screening & Eligibility'];

function generateId() { return 'id_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36); }

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtDateTime(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ' at ' + dt.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
}
function fmtTimestamp(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  const pad = n => String(n).padStart(2, '0');
  return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())} ${pad(dt.getHours())}:${pad(dt.getMinutes())}:${pad(dt.getSeconds())}`;
}
function daysUntil(dateStr) {
  if (!dateStr) return Infinity;
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.ceil((d - now) / 86400000);
}
function nowISO() { return new Date().toISOString(); }

function seedData() {

function loadState() {
  try {
    const s = localStorage.getItem(LS_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  const data = seedData();
  saveState(data);
  return data;
}
function saveState(st) { try { localStorage.setItem(LS_KEY, JSON.stringify(st)); } catch(e) {} }

const CLINICAL_TASKS = ['Informed Consent Process','Physical Examination','Assessment of Adverse Events','IP Dispensing & Accountability'];
const REGULATORY_TASKS = ['Regulatory & IRB Submissions'];

function getCurrentRole() {
  const s = getSession();
  return s ? s.role : 'Principal Investigator';
}
function canSignAsPI() { return getCurrentRole() === 'Principal Investigator'; }
function canSignAsDelegate(tasks) {
  const role = getCurrentRole();
  if (role === 'Principal Investigator' || role === 'Study Coordinator') return true;
  if (role === 'Regulatory Coordinator') {
    return tasks.every(t => REGULATORY_TASKS.includes(t) || !CLINICAL_TASKS.includes(t));
  }
  return true;
}

// ==================== TOAST ====================
let toastCount = 0;
function showToast(msg, type='success') {
  const container = document.getElementById('toast-container');
  if (container.children.length >= 3) container.removeChild(container.firstChild);
  const colors = { success: 'bg-ok text-white', error: 'bg-err text-white', warning: 'bg-gold text-white', info: 'bg-teal-600 text-white' };
  const icons = { success: 'check-circle', error: 'x-circle', warning: 'alert-triangle', info: 'info' };
  const id = 'toast-' + (++toastCount);
  const el = document.createElement('div');
  el.id = id;
  el.className = `pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg ${colors[type] || colors.info} toast-enter`;
  el.innerHTML = `<i data-lucide="${icons[type] || 'info'}" class="w-5 h-5 flex-shrink-0"></i><p class="text-sm font-medium flex-1">${msg}</p><button data-close-toast="${id}" class="p-1 hover:opacity-70"><i data-lucide="x" class="w-4 h-4"></i></button>`;
  container.appendChild(el);
  refreshIcons();
  setTimeout(() => { const t = document.getElementById(id); if (t) t.remove(); }, 4000);
}

function gcpStatusInfo(expiryDate) {
  const d = daysUntil(expiryDate);
  if (d < 0) return { label: 'EXPIRED', cls: 'badge-red', days: d };
  if (d <= 30) return { label: 'Expiring Soon', cls: 'badge-red', days: d };
  if (d <= 90) return { label: 'Expiring Soon', cls: 'badge-amber', days: d };
  return { label: 'Current', cls: 'badge-green', days: d };

function renderStepIndicator(currentStep) {
  const labels = ['Site Info', 'Your Info', 'Role & Password'];
  let html = '<div class="flex items-center justify-center gap-0 mb-8 px-4">';
  for (let i = 1; i <= 3; i++) {
    const cls = i < currentStep ? 'completed' : i === currentStep ? 'active' : 'future';
    const inner = i < currentStep ? '<i data-lucide="check" class="w-4 h-4"></i>' : i;
    html += `<div class="flex flex-col items-center"><div class="step-circle ${cls}">${inner}</div><span class="text-[10px] mt-1 font-medium ${i<=currentStep?'text-teal-700':'text-sla-400'}">${labels[i-1]}</span></div>`;
    if (i < 3) html += `<div class="step-line ${i < currentStep ? 'done' : 'pending'} mx-2" style="min-width:40px;"></div>`;
  }
  html += '</div>';
  return html;
}

function bindLoginEvents() {
  const form = document.getElementById('loginForm');
  if (form) form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const pw = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    if (!email || !pw) { errEl.textContent = 'Please enter email and password.'; errEl.classList.remove('hidden'); return; }
    const users = getAuthUsers();
    const user = users.find(u => u.email.toLowerCase() === email.toLowerCase());
    if (!user) { errEl.textContent = 'Invalid email or password.'; errEl.classList.remove('hidden'); return; }
    const hash = await hashPassword(pw, user.salt);
    if (hash !== user.passwordHash) { errEl.textContent = 'Invalid email or password.'; errEl.classList.remove('hidden'); return; }
    saveSession(user, user.siteId);
    initApp();
  });

  const demoBtn = document.getElementById('demo-login-btn');
  if (demoBtn) demoBtn.addEventListener('click', async function() {
    await ensureDemoUser();
    const users = getAuthUsers();
    const demo = users.find(u => u.email === 'demo@nokware-research.org');
    if (demo) {
      saveSession(demo, demo.siteId);
      initApp();
    }
  });

  const pwToggle = document.getElementById('login-pw-toggle');
  if (pwToggle) pwToggle.addEventListener('click', function() {
    const inp = document.getElementById('login-password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  const gotoReg = document.getElementById('goto-register');
  if (gotoReg) gotoReg.addEventListener('click', function() { showAuthScreen('register'); });
  const gotoJoin = document.getElementById('goto-join');
  if (gotoJoin) gotoJoin.addEventListener('click', function() { showAuthScreen('join'); });
}

function bindRegisterEvents() {
  const s = regWizardState;

  const gotoLogin = document.getElementById('reg-goto-login');
  if (gotoLogin) gotoLogin.addEventListener('click', function() { showAuthScreen('login'); });

  if (s.step === 1) {
    const nextBtn = document.getElementById('reg-next-1');
    if (nextBtn) nextBtn.addEventListener('click', function() {
      const name = document.getElementById('reg-site-name').value.trim();
      const errEl = document.getElementById('reg-error');
      if (!name) { errEl.textContent = 'Site name is required.'; errEl.classList.remove('hidden'); return; }
      s.siteName = name;
      s.siteNumber = document.getElementById('reg-site-number').value.trim();
      s.irbNumber = document.getElementById('reg-irb').value.trim();
      s.step = 2;
      const wrapper = document.getElementById('auth-card-wrapper');
      wrapper.innerHTML = renderRegisterCard();
      bindRegisterEvents();
      refreshIcons();
    });
  } else if (s.step === 2) {
    const backBtn = document.getElementById('reg-back-2');
    if (backBtn) backBtn.addEventListener('click', function() {
      s.firstName = document.getElementById('reg-first').value.trim();
      s.lastName = document.getElementById('reg-last').value.trim();
      s.email = document.getElementById('reg-email').value.trim();
      s.phone = document.getElementById('reg-phone').value.trim();
      s.step = s.inviteToken ? 2 : 1;
      if (s.inviteToken) return;
      const wrapper = document.getElementById('auth-card-wrapper');
      wrapper.innerHTML = renderRegisterCard();
      bindRegisterEvents();
      refreshIcons();
    });
    const nextBtn = document.getElementById('reg-next-2');
    if (nextBtn) nextBtn.addEventListener('click', function() {
      const first = document.getElementById('reg-first').value.trim();
      const last = document.getElementById('reg-last').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const errEl = document.getElementById('reg-error');
      if (!first || !last || !email) { errEl.textContent = 'First name, last name, and email are required.'; errEl.classList.remove('hidden'); return; }
      const existing = getAuthUsers().find(u => u.email.toLowerCase() === email.toLowerCase());
      if (existing) { errEl.textContent = 'An account with this email already exists.'; errEl.classList.remove('hidden'); return; }
      s.firstName = first;
      s.lastName = last;
      s.email = email;
      s.phone = document.getElementById('reg-phone').value.trim();
      s.step = 3;
      const wrapper = document.getElementById('auth-card-wrapper');
      wrapper.innerHTML = renderRegisterCard();
      bindRegisterEvents();
      refreshIcons();
    });
  } else if (s.step === 3) {
    document.querySelectorAll('[data-role-select]').forEach(card => {
      card.addEventListener('click', function() {
        s.role = this.dataset.roleSelect;
        document.querySelectorAll('[data-role-select]').forEach(c => c.classList.remove('selected'));
        this.classList.add('selected');
      });
    });

    const pwInput = document.getElementById('reg-password');
    if (pwInput) pwInput.addEventListener('input', function() { updatePasswordStrength(this.value); });
    const pwToggle = document.getElementById('reg-pw-toggle');
    if (pwToggle) pwToggle.addEventListener('click', function() { pwInput.type = pwInput.type === 'password' ? 'text' : 'password'; });

    const backBtn = document.getElementById('reg-back-3');
    if (backBtn) backBtn.addEventListener('click', function() {
      s.step = 2;
      const wrapper = document.getElementById('auth-card-wrapper');
      wrapper.innerHTML = renderRegisterCard();
      bindRegisterEvents();
      refreshIcons();
    });

    const submitBtn = document.getElementById('reg-submit');
    if (submitBtn) submitBtn.addEventListener('click', async function() {
      const pw = document.getElementById('reg-password').value;
      const cpw = document.getElementById('reg-confirm-password').value;
      const agreed = document.getElementById('reg-agree').checked;
      const errEl = document.getElementById('reg-error');
      if (!s.role) { errEl.textContent = 'Please select a role.'; errEl.classList.remove('hidden'); return; }
      if (pw.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.classList.remove('hidden'); return; }
      if (pw !== cpw) { errEl.textContent = 'Passwords do not match.'; errEl.classList.remove('hidden'); return; }
      if (!agreed) { errEl.textContent = 'You must confirm your authorization to create this account.'; errEl.classList.remove('hidden'); return; }

      const salt = generateSalt();
      const hash = await hashPassword(pw, salt);
      let siteId;

      if (s.inviteToken) {
        siteId = s.inviteSiteId;
        const invites = getAuthInvites();
        const inv = invites.find(i => i.token === s.inviteToken);
        if (inv) inv.used = true;
        saveAuthInvites(invites);
      } else {
        siteId = generateId();
        const sites = getAuthSites();
        sites.push({ id: siteId, name: s.siteName, number: s.siteNumber, irbNumber: s.irbNumber, createdAt: nowISO() });
        saveAuthSites(sites);
      }

      const userId = generateId();
      const users = getAuthUsers();
      users.push({ id: userId, firstName: s.firstName, lastName: s.lastName, email: s.email, role: s.role, passwordHash: hash, salt, siteId, invitedBy: s.inviteToken || null, createdAt: nowISO() });
      saveAuthUsers(users);

      saveSession({ id: userId, firstName: s.firstName, lastName: s.lastName, email: s.email, role: s.role }, siteId);

      // Update edelegate_state with user info
      STATE.currentUser = { name: s.firstName + ' ' + s.lastName, role: s.role, initials: (s.firstName[0] + s.lastName[0]).toUpperCase(), email: s.email };
      if (!s.inviteToken) {
        STATE.settings.siteName = s.siteName;
        STATE.settings.siteNumber = s.siteNumber || STATE.settings.siteNumber;
        STATE.settings.irbNumber = s.irbNumber || STATE.settings.irbNumber;
      }
      saveState(STATE);

      initApp();
      showToast(`Welcome to e-Delegate, ${s.firstName}! Your ${s.inviteToken ? 'account' : 'site account'} has been created.`, 'success');
    });
  }
}

function updatePasswordStrength(pw) {
  const bars = document.querySelectorAll('#pw-strength-bar .strength-bar');
  const label = document.getElementById('pw-strength-label');
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['#DC2626','#F59E0B','#F59E0B','#059669'];
  const labels = ['Weak','Fair','Good','Strong'];
  bars.forEach((b, i) => { b.style.background = i < score ? colors[Math.min(score-1,3)] : '#E2E8F0'; });
  label.textContent = pw.length > 0 ? labels[Math.min(score-1,3)] || '' : '';
  label.style.color = pw.length > 0 ? colors[Math.min(score-1,3)] || '#94A3B8' : '#94A3B8';
}

function bindJoinEvents() {
  const gotoLogin = document.getElementById('join-goto-login');
  if (gotoLogin) gotoLogin.addEventListener('click', function() { showAuthScreen('login'); });

  const verifyBtn = document.getElementById('join-verify');
  if (verifyBtn) verifyBtn.addEventListener('click', function() {
    let code = document.getElementById('join-code').value.trim();
    const errEl = document.getElementById('join-error');
    // Extract token from URL if pasted as link
    if (code.includes('invite=')) {
      try { code = new URL(code).searchParams.get('invite') || code; } catch { const m = code.match(/invite=([a-f0-9]+)/); if (m) code = m[1]; }
    }
    const invites = getAuthInvites();
    const inv = invites.find(i => i.token === code && !i.used && new Date(i.expiresAt) > new Date());
    if (!inv) { errEl.textContent = 'This invite code is invalid or has expired.'; errEl.classList.remove('hidden'); return; }

    // Start registration with invite context
    const site = getAuthSites().find(s => s.id === inv.siteId);
    regWizardState = { step: 2, siteName: site?.name || inv.siteName, siteNumber: site?.number || '', irbNumber: site?.irbNumber || '', firstName: '', lastName: '', email: '', phone: '', role: '', password: '', confirmPassword: '', agreed: false, inviteToken: inv.token, inviteSiteId: inv.siteId, inviteSiteName: inv.siteName };
    const wrapper = document.getElementById('auth-card-wrapper');
    wrapper.style.maxWidth = '36rem';
    wrapper.innerHTML = renderRegisterCard();
    bindRegisterEvents();
    refreshIcons();
  });
}

function showInviteRegistration(token) {
  const invites = getAuthInvites();
  const inv = invites.find(i => i.token === token && !i.used && new Date(i.expiresAt) > new Date());
  if (!inv) {
    showAuthScreen('login');
    setTimeout(() => showToast('This invite code is invalid or has expired.', 'error'), 300);
    return;
  }
  const site = getAuthSites().find(s => s.id === inv.siteId);
  regWizardState = { step: 2, siteName: site?.name || inv.siteName, siteNumber: site?.number || '', irbNumber: site?.irbNumber || '', firstName: '', lastName: '', email: '', phone: '', role: '', password: '', confirmPassword: '', agreed: false, inviteToken: inv.token, inviteSiteId: inv.siteId, inviteSiteName: inv.siteName };
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app-container').classList.add('hidden');
  const wrapper = document.getElementById('auth-card-wrapper');
  wrapper.style.maxWidth = '36rem';
  wrapper.innerHTML = renderRegisterCard();
  bindRegisterEvents();
  refreshIcons();
}

async function ensureDemoUser() {

    let demoSite = sites.find(s => s.name === 'Nokware Research Site 001');

      sites.push(demoSite);
      saveAuthSites(sites);
    }
    const salt = generateSalt();
    const hash = await hashPassword('Demo1234!', salt);
    demo = { id: generateId(), firstName: 'Kojo A. Quansah', lastName: 'Jr., PharmD', email: 'demo@nokware-research.org', role: 'Principal Investigator', passwordHash: hash, salt, siteId: demoSite.id, invitedBy: null, createdAt: nowISO() };

// ==================== INIT APP ====================
function initApp() {
  const session = getSession();
  const params = new URLSearchParams(window.location.search);
  const inviteToken = params.get('invite');

  if (inviteToken) {
    showInviteRegistration(inviteToken);
    return;
  }

  if (!session) {
    showAuthScreen('login');
    return;
  }

  // Set current user from session
  STATE.currentUser = {
    name: session.firstName + ' ' + session.lastName,
    role: session.role,
    email: session.email,
    initials: (session.firstName[0] + (session.lastName || ' ')[0]).toUpperCase(),
  };
  saveState(STATE);

  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app-container').classList.remove('hidden');

  // Update sidebar user section
  updateUserDisplay();

  renderView('dashboard');
  handleResize();
}

function updateUserDisplay() {
  const session = getSession();
  if (!session) return;
  const initials = (session.firstName[0] + (session.lastName || ' ')[0]).toUpperCase();

// ---------- DELEGATIONS ----------
function renderDelegations() {
  let filtered = [...STATE.delegations];
  if (delegationFilter.protocol !== 'all') filtered = filtered.filter(d => d.protocolId === delegationFilter.protocol);
  if (delegationFilter.status !== 'all') filtered = filtered.filter(d => d.status === delegationFilter.status);
  if (delegationFilter.search) {
    const q = delegationFilter.search.toLowerCase();
    filtered = filtered.filter(d => {
      const pr = getProtocol(d.protocolId);
      const pe = getPersonnel(d.personnelId);
      return (pr?.title||'').toLowerCase().includes(q) || (pr?.number||'').toLowerCase().includes(q) || (pe?.name||'').toLowerCase().includes(q) || d.tasks.some(t => t.toLowerCase().includes(q));
    });
  }

  return `<div class="fade-in space-y-6">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <h1 class="text-2xl font-bold section-title">Delegation Log</h1>
    <button data-action="new-delegation" class="inline-flex items-center gap-2 px-5 py-2.5 btn-primary text-sm font-semibold rounded-xl"><i data-lucide="plus" class="w-4 h-4"></i> New Delegation</button>
  </div>
  <div class="flex flex-col md:flex-row gap-3">
    <select id="filter-protocol" class="px-4 py-2.5 rounded-xl border border-sla-200 text-sm bg-white min-w-[180px]">
      <option value="all">All Protocols</option>
      ${STATE.protocols.map(p => `<option value="${p.id}" ${delegationFilter.protocol===p.id?'selected':''}>${p.number}</option>`).join('')}
    </select>
    <select id="filter-status" class="px-4 py-2.5 rounded-xl border border-sla-200 text-sm bg-white min-w-[140px]">
      <option value="all" ${delegationFilter.status==='all'?'selected':''}>All Status</option>
      <option value="Active" ${delegationFilter.status==='Active'?'selected':''}>Active</option>
      <option value="Pending" ${delegationFilter.status==='Pending'?'selected':''}>Pending</option>
      <option value="Expired" ${delegationFilter.status==='Expired'?'selected':''}>Expired</option>
    </select>
    <div class="relative flex-1">
      <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-sla-400"></i>
      <input id="filter-search" type="text" placeholder="Search delegations..." value="${delegationFilter.search}" class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-sla-200 text-sm" />
    </div>
  </div>

  ${filtered.length === 0 ? `<div class="bg-white rounded-2xl border border-sla-100 p-12 text-center">
    <div class="w-16 h-16 rounded-full bg-sla-100 flex items-center justify-center mx-auto mb-4"><i data-lucide="clipboard-list" class="w-8 h-8 text-sla-300"></i></div>
    <h3 class="text-lg font-semibold text-sla-700">No delegations found</h3>
    <p class="text-sm text-sla-400 mt-1">Try adjusting your filters or add a new delegation.</p>
    <button data-action="new-delegation" class="mt-4 inline-flex items-center gap-2 px-5 py-2.5 btn-primary text-sm font-semibold rounded-xl"><i data-lucide="plus" class="w-4 h-4"></i> Add Delegation</button>
  </div>` : `
  <div class="bg-white rounded-2xl border border-sla-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead><tr class="text-xs uppercase tracking-wider border-b" style="background: linear-gradient(90deg, #f8fafc, #f0fdf9); border-bottom: 2px solid rgba(13,148,136,0.1); color: #0A1628; font-weight: 600; letter-spacing: 0.05em;">
          <th class="px-4 py-3">Protocol</th><th class="px-4 py-3">Personnel</th><th class="px-4 py-3 hidden lg:table-cell">Delegated Tasks</th><th class="px-4 py-3">Start</th><th class="px-4 py-3 hidden md:table-cell">PI Sig.</th><th class="px-4 py-3 hidden md:table-cell">Delegate Sig.</th><th class="px-4 py-3">Training</th><th class="px-4 py-3">Status</th><th class="px-4 py-3 text-right">Actions</th>
        </tr></thead>
        <tbody>${filtered.map(d => {
          const pr = getProtocol(d.protocolId);
          const pe = getPersonnel(d.personnelId);
          const statusCls = d.status === 'Active' ? 'badge-green' : d.status === 'Pending' ? 'badge-amber' : 'badge-gray';
          const taskDisplay = d.tasks.length <= 2 ? d.tasks.join(', ') : d.tasks.slice(0,2).join(', ') + ` <span class="badge badge-gray">+${d.tasks.length-2}</span>`;
          const peGcp = pe ? daysUntil(pe.gcpExpiry) : 999;
          const trainBadge = !d.trainingVerified || peGcp < 0 ? '<span class="badge badge-red">EXPIRED</span>' : '<span class="badge badge-green">Verified</span>';
          return `<tr class="table-row border-b border-sla-50">
            <td class="px-4 py-3"><span class="badge ${protocolBadgeColor(pr?.number||'')}">${pr?.number||'—'}</span></td>
            <td class="px-4 py-3"><p class="text-sm font-medium text-sla-800">${pe?.name||'—'}</p><p class="text-xs text-sla-400">${pe?.role||''}</p></td>
            <td class="px-4 py-3 text-xs text-sla-600 hidden lg:table-cell max-w-[240px]">${taskDisplay}</td>
            <td class="px-4 py-3 text-sm text-sla-500 tabular-nums whitespace-nowrap">${fmtDate(d.startDate)}</td>
            <td class="px-4 py-3 hidden md:table-cell">${d.piSigned ? '<span class="inline-flex items-center gap-1 text-xs text-ok font-medium"><i data-lucide="check-circle" class="w-3.5 h-3.5"></i>Signed</span>' : '<span class="inline-flex items-center gap-1 text-xs text-err font-medium"><i data-lucide="clock" class="w-3.5 h-3.5"></i>Pending</span>'}</td>
            <td class="px-4 py-3 hidden md:table-cell">${d.delegateSigned ? '<span class="inline-flex items-center gap-1 text-xs text-ok font-medium"><i data-lucide="check-circle" class="w-3.5 h-3.5"></i>Signed</span>' : '<span class="inline-flex items-center gap-1 text-xs text-err font-medium"><i data-lucide="clock" class="w-3.5 h-3.5"></i>Pending</span>'}</td>
            <td class="px-4 py-3">${trainBadge}</td>
            <td class="px-4 py-3"><span class="badge ${statusCls}">${d.status}</span></td>
            <td class="px-4 py-3 text-right whitespace-nowrap">
              <button data-action="view-delegation" data-id="${d.id}" class="p-1.5 rounded-lg hover:bg-sla-100 text-sla-500 hover:text-teal-600" title="View"><i data-lucide="eye" class="w-4 h-4"></i></button>
              <button data-action="sign-delegation" data-id="${d.id}" class="p-1.5 rounded-lg hover:bg-sla-100 text-sla-500 hover:text-teal-600" title="Sign"><i data-lucide="pen-line" class="w-4 h-4"></i></button>
            </td>
          </tr>`;}).join('')}</tbody>
      </table>
    </div>
    <div class="px-5 py-3 border-t border-sla-100 text-xs text-sla-400">${filtered.length} delegation${filtered.length!==1?'s':''} found</div>
  </div>`}
</div>`;
}

// ---------- TRAINING ----------
function renderTraining() {
  const totalStaff = STATE.personnel.length;
  const expired = STATE.personnel.filter(p => daysUntil(p.gcpExpiry) < 0).length;
  const current = totalStaff - expired;
  const pct = totalStaff > 0 ? Math.round((current / totalStaff) * 100) : 100;
  const sorted = [...STATE.personnel].sort((a, b) => daysUntil(a.gcpExpiry) - daysUntil(b.gcpExpiry));

  return `<div class="fade-in space-y-6">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <h1 class="text-2xl font-bold section-title">Training Records</h1>
    <button data-action="upload-cert" class="inline-flex items-center gap-2 px-5 py-2.5 btn-primary text-sm font-semibold rounded-xl"><i data-lucide="upload" class="w-4 h-4"></i> Upload Certificate</button>
  </div>

  <div class="bg-white rounded-2xl border border-sla-100 p-5 card-accent-teal">
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-sm font-semibold text-sla-700">${current} of ${totalStaff} staff GCP-certified and current (${pct}%)</h3>
      <span class="text-sm font-bold ${pct >= 90 ? 'text-ok' : pct >= 70 ? 'text-gold' : 'text-err'}">${pct}%</span>
    </div>
    <div class="w-full bg-sla-200 rounded-full overflow-hidden" style="height:8px;">
      <div class="h-full compliance-bar progress-bar" style="width:${pct}%"></div>
    </div>
  </div>

  <div class="bg-white rounded-2xl border border-sla-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead><tr class="text-xs uppercase tracking-wider border-b" style="background: linear-gradient(90deg, #f8fafc, #f0fdf9); border-bottom: 2px solid rgba(13,148,136,0.1); color: #0A1628; font-weight: 600; letter-spacing: 0.05em;">
          <th class="px-5 py-3">Personnel</th><th class="px-5 py-3">Role</th><th class="px-5 py-3">Cert Type</th><th class="px-5 py-3 hidden md:table-cell">Issued</th><th class="px-5 py-3">Expiry</th><th class="px-5 py-3">Days Left</th><th class="px-5 py-3">Status</th>
        </tr></thead>
        <tbody>${sorted.map(p => {
          const info = gcpStatusInfo(p.gcpExpiry);
          const d = daysUntil(p.gcpExpiry);
          const expDt = new Date(p.gcpExpiry);
          const issuedDt = new Date(expDt); issuedDt.setFullYear(issuedDt.getFullYear()-3);
          return `<tr class="table-row border-b border-sla-50">
            <td class="px-5 py-3 text-sm font-medium text-sla-800">${p.name}</td>
            <td class="px-5 py-3 text-sm text-sla-500">${p.role}</td>
            <td class="px-5 py-3 text-sm text-sla-600">GCP / ICH E6(R2)</td>
            <td class="px-5 py-3 text-sm text-sla-500 tabular-nums hidden md:table-cell">${fmtDate(issuedDt.toISOString())}</td>
            <td class="px-5 py-3 text-sm tabular-nums ${d < 0 ? 'text-err font-semibold' : 'text-sla-600'}">${fmtDate(p.gcpExpiry)}</td>
            <td class="px-5 py-3 text-sm tabular-nums font-medium ${d < 0 ? 'text-err' : d <= 90 ? 'text-gold' : 'text-ok'}">${d < 0 ? 'EXPIRED' : d + ' days'}</td>
            <td class="px-5 py-3"><span class="badge ${info.cls}">${info.label}</span></td>
          </tr>`;}).join('')}</tbody>
      </table>
    </div>
  </div>
</div>`;
}

function saveDelegation(requestSigs) {
  const proto = document.getElementById('nd-protocol')?.value;
  const pers = document.getElementById('nd-personnel')?.value;
  const start = document.getElementById('nd-start')?.value;
  const tasks = [...document.querySelectorAll('.nd-task:checked')].map(c => c.value);
  const errEl = document.getElementById('nd-error');
  if (!proto || !pers || !start || tasks.length === 0) {
    if (errEl) { errEl.textContent = 'Please fill in all required fields (Protocol, Personnel, Start Date, and at least one Task).'; errEl.classList.remove('hidden'); }
    return;
  }
  const entry = {
    id: generateId(), protocolId: proto, personnelId: pers, tasks, startDate: start,
    endDate: document.getElementById('nd-end')?.value || '',
    piSigned: false, piSignedBy: '', piSignedDate: '', delegateSigned: false, delegateSignedDate: '',
    trainingVerified: false, status: 'Pending'
  };
  STATE.delegations.push(entry);
  const pr = getProtocol(proto);
  const pe = getPersonnel(pers);
  addAuditEntry('Created delegation', `${pe?.name} → ${pr?.number}`);
  saveState(STATE);
  closeModal();
  showToast(`Delegation created for ${pe?.name}`, 'success');
  if (currentView === 'delegations' || currentView === 'dashboard') renderView(currentView);
}

      <div>
        <label class="block text-sm font-medium text-sla-600 mb-1">Password *</label>

        <button data-action="submit-signature" data-id="${delegationId}" data-type="${sigType}" data-name="${signerName}" class="px-5 py-2.5 text-sm font-semibold btn-primary rounded-xl">Sign Document</button>

function submitSignature(delegationId, sigType, signerName) {
  const pw = document.getElementById('sig-password')?.value;
  const errEl = document.getElementById('sig-error');
  if (!pw) {
    if (errEl) { errEl.textContent = 'Password is required to authenticate your signature.'; errEl.classList.remove('hidden'); }
    return;
  }
  const d = STATE.delegations.find(x => x.id === delegationId);
  if (!d) return;
  const now = nowISO();
  if (sigType === 'pi') {
    d.piSigned = true; d.piSignedBy = signerName; d.piSignedDate = now;
  } else {
    d.delegateSigned = true; d.delegateSignedDate = now;
  }
  if (d.piSigned && d.delegateSigned && d.status === 'Pending') d.status = 'Active';
  const pr = getProtocol(d.protocolId);
  addAuditEntry(`${sigType === 'pi' ? 'PI' : 'Delegate'} signed delegation`, `${signerName} → ${pr?.number}`);
  saveState(STATE);
  closeModal();
  showToast(`Signature recorded — ${signerName} — ${fmtDateTime(now)}`, 'success');
  if (currentView === 'delegations' || currentView === 'dashboard') renderView(currentView);
}

function saveProtocol() {
  const num = document.getElementById('npr-number')?.value?.trim();
  const title = document.getElementById('npr-title')?.value?.trim();
  const sponsor = document.getElementById('npr-sponsor')?.value?.trim();
  const pi = document.getElementById('npr-pi')?.value?.trim();
  const amendment = document.getElementById('npr-amendment')?.value?.trim();
  const status = document.getElementById('npr-status')?.value;
  const errEl = document.getElementById('npr-error');
  if (!num || !title || !sponsor || !pi || !amendment) {
    if (errEl) { errEl.textContent = 'Please fill in all required fields.'; errEl.classList.remove('hidden'); }
    return;
  }
  STATE.protocols.push({ id: generateId(), number: num, title, sponsor, status, pi, amendment });
  addAuditEntry('Created protocol', `${num} — ${title}`);
  saveState(STATE);
  closeModal();
  showToast(`Protocol ${num} created`, 'success');
  renderView('protocols');
}

function saveCert() {
  const persId = document.getElementById('uc-personnel')?.value;
  const expiry = document.getElementById('uc-expiry')?.value;
  const errEl = document.getElementById('uc-error');
  if (!persId || !expiry) {
    if (errEl) { errEl.textContent = 'Please fill in all required fields.'; errEl.classList.remove('hidden'); }
    return;
  }
  const p = getPersonnel(persId);
  if (p) { p.gcpExpiry = expiry; }
  addAuditEntry('Updated training record', `${p?.name} — GCP cert updated`);
  saveState(STATE);
  closeModal();
  showToast(`Training record updated for ${p?.name}`, 'success');
  if (currentView === 'training') renderView('training');
}

        <div class="w-12 h-12 rounded-full flex items-center justify-center text-lg font-bold text-white" style="background: linear-gradient(135deg, #0D9488, #7C3AED);">${p.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
        <div><h2 class="text-lg font-semibold text-white">${p.name}</h2><p class="text-sm text-white/70">${p.role}</p></div>

function exportAuditCSV() {
  const rows = [['Timestamp','User','Action','Record Affected','IP Address']];
  STATE.auditTrail.forEach(a => { rows.push([fmtTimestamp(a.timestamp), a.user, a.action, a.target, a.ip]); });
  const csv = rows.map(r => r.map(c => `"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `edelegate-audit-trail-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Audit trail exported as CSV', 'success');
}

// ==================== EVENT BINDING ====================
function bindViewEvents(view) {
  if (view === 'delegations') {
    const fp = document.getElementById('filter-protocol');
    const fs = document.getElementById('filter-status');
    const fsr = document.getElementById('filter-search');
    if (fp) fp.addEventListener('change', e => { delegationFilter.protocol = e.target.value; renderView('delegations'); });
    if (fs) fs.addEventListener('change', e => { delegationFilter.status = e.target.value; renderView('delegations'); });
    if (fsr) fsr.addEventListener('input', e => { delegationFilter.search = e.target.value; renderView('delegations'); });
  }
  if (view === 'audit') {
    const uf = document.getElementById('audit-user-filter');
    const af = document.getElementById('audit-action-filter');
    if (uf) uf.addEventListener('change', () => filterAudit());
    if (af) af.addEventListener('change', () => filterAudit());
  }
  if (view === 'settings') {
    document.querySelectorAll('[data-setting]').forEach(el => {
      el.addEventListener('change', e => {
        STATE.settings[e.target.dataset.setting] = e.target.checked;
        saveState(STATE);
      });
    });
  }
}

function filterAudit() {
  const user = document.getElementById('audit-user-filter')?.value || 'all';
  const action = document.getElementById('audit-action-filter')?.value || 'all';
  document.querySelectorAll('#audit-tbody tr').forEach(tr => {
    const u = tr.dataset.user;
    const a = tr.dataset.actionType;
    let show = true;
    if (user !== 'all' && u !== user) show = false;
    if (action !== 'all') {
      const actionLower = a.toLowerCase();
      if (!actionLower.includes(action.toLowerCase())) show = false;
    }
    tr.style.display = show ? '' : 'none';
  });
}

// ==================== GLOBAL EVENT DELEGATION ====================
document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  switch(action) {
    case 'close-modal': closeModal(); break;
    case 'new-delegation': openNewDelegationModal(); break;
    case 'save-delegation': saveDelegation(true); break;
    case 'save-draft-delegation': saveDelegation(false); break;
    case 'view-delegation':
    case 'sign-delegation':
      openDelegationDetail(btn.dataset.id); break;
    case 'open-sig-modal':
      openSignatureModal(btn.dataset.id, btn.dataset.type); break;
    case 'submit-signature':
      submitSignature(btn.dataset.id, btn.dataset.type, btn.dataset.name); break;
    case 'verify-training': {
      const d = STATE.delegations.find(x => x.id === btn.dataset.id);
      if (d) { d.trainingVerified = true; saveState(STATE); addAuditEntry('Verified training', getPersonnel(d.personnelId)?.name || ''); }
      closeModal();
      showToast('Training verified', 'success');
      if (currentView === 'delegations' || currentView === 'dashboard') renderView(currentView);
      break;
    }
    case 'new-personnel': openNewPersonnelModal(); break;
    case 'save-personnel': savePersonnel(); break;
    case 'view-personnel': openPersonnelDetail(btn.dataset.id); break;
    case 'new-protocol': openNewProtocolModal(); break;
    case 'save-protocol': saveProtocol(); break;
    case 'upload-cert': openUploadCertModal(); break;
    case 'save-cert': saveCert(); break;
    case 'export-audit': exportAuditCSV(); break;
    case 'print-delegation': window.print(); break;
    case 'save-profile': showToast('Profile saved', 'success'); break;
    case 'save-settings': {
      STATE.settings.siteName = document.getElementById('set-site-name')?.value || STATE.settings.siteName;
      STATE.settings.siteNumber = document.getElementById('set-site-number')?.value || STATE.settings.siteNumber;
      STATE.settings.irbNumber = document.getElementById('set-irb')?.value || STATE.settings.irbNumber;
      saveState(STATE);
      showToast('Settings saved', 'success');
      break;
    }
    case 'filter-protocol': {
      delegationFilter.protocol = btn.dataset.proto;
      delegationFilter.status = 'all';
      delegationFilter.search = '';
      renderView('delegations');
      break;
    }
    case 'go-delegations': renderView('delegations'); break;
    case 'generate-invite': {
      const session = getSession();
      if (!session) break;
      const token = generateToken();
      const sites = getAuthSites();
      const site = sites.find(s => s.id === session.siteId);
      const invites = getAuthInvites();
      invites.push({
        token,
        siteId: session.siteId,
        siteName: site?.name || STATE.settings.siteName,
        createdBy: session.userId,
        createdByName: session.firstName + ' ' + session.lastName,
        expiresAt: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString(),
        used: false
      });
      saveAuthInvites(invites);
      const inviteUrl = window.location.origin + window.location.pathname + '?invite=' + token;
      const cardEl = document.getElementById('invite-link-card');
      if (cardEl) {
        cardEl.innerHTML = `<div class="bg-teal-50 border border-teal-200 rounded-xl p-4 mt-4 fade-in">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-semibold text-teal-800">Invite Link (expires in 7 days)</span>
            <span class="badge badge-green">Active</span>
          </div>
          <div class="flex items-center gap-2">
            <input type="text" readonly value="${inviteUrl}" id="invite-url-input" class="flex-1 text-xs font-mono bg-white border border-teal-200 rounded-lg px-3 py-2 text-sla-600" />
            <button data-action="copy-invite" class="btn-primary text-sm px-4 py-2 rounded-lg">Copy</button>
          </div>
          <p class="text-xs text-teal-600 mt-2">Share this link with your colleague. They'll be prompted to register and select their role.</p>
        </div>`;
        refreshIcons();
      }
      addAuditEntry('Generated invite link', 'Team invite');
      saveState(STATE);
      showToast('Invite link generated!', 'success');
      break;
    }
    case 'copy-invite': {
      const inp = document.getElementById('invite-url-input');
      if (inp) {
        navigator.clipboard.writeText(inp.value).then(() => {
          showToast('Invite link copied to clipboard!', 'success');
        }).catch(() => {
          inp.select();
          document.execCommand('copy');
          showToast('Invite link copied to clipboard!', 'success');
        });
      }
      break;
    }
    case 'revoke-invite': {
      const token = btn.dataset.token;
      const invites = getAuthInvites();
      const inv = invites.find(i => i.token === token);
      if (inv) { inv.used = true; saveAuthInvites(invites); }
      showToast('Invite revoked', 'info');
      renderView('settings');
      break;
    }
  }
});

// Close toast

});

document.addEventListener('click', function(e) {
  if (e.target.id === 'modal-backdrop') closeModal();
});

// Sidebar nav
document.querySelectorAll('#sidebar-nav .sidebar-item').forEach(item => {
  item.addEventListener('click', function() {
    renderView(this.dataset.view);
    document.getElementById('sidebar-overlay').classList.add('hidden');
    document.getElementById('sidebar').style.transform = '';
  });
});

// Sidebar toggle (mobile)
document.getElementById('sidebar-toggle').addEventListener('click', function() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  overlay.classList.remove('hidden');
  sidebar.style.transform = 'translateX(0)';
});
document.getElementById('sidebar-overlay').addEventListener('click', function() {
  this.classList.add('hidden');
});

// Notification bell
document.getElementById('notif-bell').addEventListener('click', function() {
  const pending = STATE.delegations.filter(d => !d.piSigned || !d.delegateSigned).length;
  const expired = STATE.personnel.filter(p => daysUntil(p.gcpExpiry) < 0).length;
  showToast(`${pending} pending signature${pending!==1?'s':''}, ${expired} expired training record${expired!==1?'s':''}`, 'info');
});

// Responsive sidebar
function handleResize() {
  const sidebar = document.getElementById('sidebar');
  const main = document.getElementById('main-wrapper');
  if (window.innerWidth < 768) {
    sidebar.style.transform = 'translateX(-100%)';
    main.style.marginLeft = '0';
  } else {
    sidebar.style.transform = 'translateX(0)';
    main.style.marginLeft = '260px';
    document.getElementById('sidebar-overlay').classList.add('hidden');
  }
}
window.addEventListener('resize', handleResize);

// ==================== BOOT ====================
if (typeof lucide !== 'undefined' && typeof lucide.createIcons === 'function') {
  lucide.createIcons();
}

initApp();
